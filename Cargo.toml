[package]
name = "chrome-for-testing"
version = "0.2.0"
edition = "2021"
rust-version = "1.80.0"
repository = "https://github.com/lpotthast/chrome-for-testing"
description = """
Interact with the chrome-for-testing JSON API.
"""
categories = ["web-programming", "development-tools::testing"]
keywords = ["chrome", "testing", "chromedriver"]
license = "MIT OR Apache-2.0"
readme = "README.md"
authors = ["Lukas Potthast <privat@lukas-potthast.de>"]

[dependencies]
reqwest = { version = "0.12.23", features = ["json"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.135"
thiserror = "2.0.16"
time = { version = "0.3.41", features = ["serde", "parsing", "macros"] }
url = "2.5.4"

[dev-dependencies]
assertr = "0.3.9"
mockito = "1.6.1"
serde_json = "1.0.145"
tokio = { version = "1.47.1", features = ["macros", "rt-multi-thread"] }
